<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Next bin day</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3e8;
        --panel: rgba(255, 255, 255, 0.82);
        --text: #1f2c1d;
        --muted: #5a6f56;
        --ring: rgba(31, 44, 29, 0.08);
        --page-pad: clamp(2px, 0.6vmin, 8px);
        --section-pad: clamp(12px, 1.8vmin, 24px);
        --card-pad-y: clamp(12px, 2vmin, 22px);
        --card-pad-x: clamp(10px, 1.8vmin, 16px);
        --gap: clamp(10px, 1.8vmin, 18px);
        --img-size: clamp(64px, 11vmin, 112px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Barlow", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(113, 161, 83, 0.18), transparent 30%),
          linear-gradient(135deg, #f4f8f0 0%, #e5eedc 100%);
        color: var(--text);
        overflow: hidden;
      }

      body.compact {
        --page-pad: 0px;
        --section-pad: clamp(8px, 1.2vmin, 14px);
        --card-pad-y: clamp(8px, 1.1vmin, 12px);
        --card-pad-x: clamp(8px, 1.1vmin, 12px);
        --gap: clamp(8px, 1.2vmin, 14px);
        --img-size: clamp(120px, 18vmin, 220px);
        background: #f5f8ef;
      }

      main {
        height: 100dvh;
        display: grid;
        place-items: center;
        padding: var(--page-pad);
      }

      .panel {
        width: 100%;
        max-height: calc(100dvh - (var(--page-pad) * 2));
        background: var(--panel);
        border-radius: clamp(18px, 3vmin, 28px);
        box-shadow: 0 24px 80px rgba(44, 63, 34, 0.12);
        overflow: hidden;
        backdrop-filter: blur(10px);
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .hero {
        padding: var(--section-pad) var(--section-pad) clamp(10px, 1.6vmin, 20px);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: clamp(0.75rem, 1.6vmin, 0.95rem);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 5.2vmin, 4.5rem);
        line-height: 0.95;
      }

      .subhead {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: clamp(0.82rem, 1.9vmin, 1.15rem);
      }

      .bins {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(140px, 100%), 1fr));
        gap: var(--gap);
        padding: 0 var(--section-pad) var(--section-pad);
        align-content: center;
      }

      .bin-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: clamp(10px, 1.8vmin, 20px);
        padding: var(--card-pad-y) var(--card-pad-x);
        background: rgba(255, 255, 255, 0.72);
        border-radius: clamp(16px, 2.4vmin, 22px);
        box-shadow: inset 0 0 0 1px rgba(31, 44, 29, 0.04);
        min-width: 0;
      }

      .bin-card img {
        width: var(--img-size);
        height: var(--img-size);
        object-fit: contain;
      }

      .bin-card h2 {
        margin: 0;
        font-size: clamp(1rem, 2.2vmin, 1.5rem);
        line-height: 1.2;
        max-width: 18ch;
      }

      footer {
        padding: 0 var(--section-pad) var(--section-pad);
        color: var(--muted);
        font-size: clamp(0.7rem, 1.5vmin, 0.9rem);
      }

      @media (min-aspect-ratio: 14/9) {
        .panel {
          height: calc(100dvh - (var(--page-pad) * 2));
        }

        .bins {
          height: 100%;
          align-content: stretch;
        }

        .bin-card {
          height: 100%;
        }

        .bin-card img {
          width: clamp(110px, 14vmin, 190px);
          height: clamp(110px, 14vmin, 190px);
        }

        .bin-card h2 {
          font-size: clamp(1.2rem, 2.4vmin, 1.9rem);
        }
      }

      body.compact .panel {
        width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        grid-template-rows: auto 1fr;
        border-radius: 0;
        border: 0;
        box-shadow: none;
        backdrop-filter: none;
      }

      body.compact .hero {
        padding-top: clamp(10px, 1.6vmin, 16px);
        padding-bottom: clamp(4px, 0.8vmin, 8px);
      }

      body.compact .eyebrow {
        margin-bottom: 4px;
        font-size: clamp(0.8rem, 1.2vmin, 0.95rem);
      }

      body.compact h1 {
        font-size: clamp(2rem, 4.8vmin, 3.8rem);
      }

      body.compact .subhead {
        margin-top: 4px;
        font-size: clamp(0.95rem, 1.7vmin, 1.15rem);
      }

      body.compact .bins {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-content: stretch;
        padding-top: clamp(4px, 0.8vmin, 8px);
        height: 100%;
      }

      body.compact .bin-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        border-radius: clamp(10px, 1.4vmin, 16px);
        gap: clamp(12px, 2vmin, 22px);
      }

      body.compact .bin-card h2 {
        font-size: clamp(1.2rem, 2.1vmin, 1.8rem);
        max-width: 18ch;
      }

      body.compact footer {
        display: none;
      }

      @media (max-width: 760px) {
        .bins {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 460px) {
        .bins {
          grid-template-columns: 1fr;
        }
      }

      @media (max-height: 900px) {
        .subhead {
          margin-top: 10px;
        }
      }

      @media (max-height: 760px) {
        .bins {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-height: 620px) {
        .eyebrow {
          margin-bottom: 4px;
        }

        .subhead {
          margin-top: 8px;
        }
      }

      @media (max-aspect-ratio: 16/9) {
        body.compact .bins {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-height: 700px) {
        body.compact {
          --img-size: clamp(88px, 14vmin, 140px);
        }

        body.compact h1 {
          font-size: clamp(1.6rem, 4vmin, 3rem);
        }

        body.compact .subhead {
          font-size: clamp(0.82rem, 1.35vmin, 1rem);
        }

        body.compact .bin-card h2 {
          font-size: clamp(0.95rem, 1.7vmin, 1.2rem);
        }
      }

      body.compact main {
        place-items: stretch;
        padding: 0;
      }

      body.compact .hero,
      body.compact .bins {
        width: 100%;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main>
      <section class="panel">
        <header class="hero">
          <p class="eyebrow">Next collection</p>
          <h1>Tuesday, 7 April 2026</h1>
          <p class="subhead">117 Radbourne Street, Derby, DE22 3BW</p>
        </header>
        <section class="bins">
          
        <article class="bin-card bin-card--recycling">
          <img src="https://secure.derby.gov.uk/binday/images/blue-bin.png" alt="Blue bin" />
          <h2>Recycling blue bin collection</h2>
        </article>
      
        <article class="bin-card bin-card--garden">
          <img src="https://secure.derby.gov.uk/binday/images/brown-bin.png" alt="Brown bin" />
          <h2>Garden brown bin collection</h2>
        </article>
      
        <article class="bin-card bin-card--food">
          <img src="https://secure.derby.gov.uk/binday/images/food-bin.png" alt="Food bin" />
          <h2>Food waste bin collection</h2>
        </article>
      
        </section>
        <footer>
          Updated 06/04/2026, 16:10:07 UTC
        </footer>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("compact") === "1") {
        document.body.classList.add("compact");
      }
    </script>
  </body>
</html>
