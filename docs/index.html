<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Next bin day</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3e8;
        --panel: rgba(255, 255, 255, 0.82);
        --text: #1f2c1d;
        --muted: #5a6f56;
        --ring: rgba(31, 44, 29, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Barlow", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(113, 161, 83, 0.18), transparent 30%),
          linear-gradient(135deg, #f4f8f0 0%, #e5eedc 100%);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(980px, 100%);
        background: var(--panel);
        border: 1px solid var(--ring);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(44, 63, 34, 0.12);
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .hero {
        padding: 32px 32px 20px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 4.5rem);
        line-height: 0.95;
      }

      .subhead {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.6vw, 1.15rem);
      }

      .bins {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 18px;
        padding: 0 32px 32px;
      }

      .bin-card {
        display: grid;
        justify-items: center;
        text-align: center;
        gap: 12px;
        padding: 22px 16px;
        background: rgba(255, 255, 255, 0.72);
        border-radius: 22px;
        border: 1px solid rgba(31, 44, 29, 0.08);
      }

      .bin-card img {
        width: 112px;
        height: 112px;
        object-fit: contain;
      }

      .bin-card h2 {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.2;
      }

      footer {
        padding: 0 32px 24px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      @media (max-width: 640px) {
        .hero {
          padding: 24px 24px 12px;
        }

        .bins {
          padding: 0 24px 24px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        footer {
          padding: 0 24px 24px;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main>
      <section class="panel">
        <header class="hero">
          <p class="eyebrow">Next collection</p>
          <h1>Tuesday, 7 April 2026</h1>
          <p class="subhead">117 Radbourne Street, Derby, DE22 3BW</p>
        </header>
        <section class="bins">
          
        <article class="bin-card bin-card--recycling">
          <img src="https://secure.derby.gov.uk/binday/images/blue-bin.png" alt="Blue bin" />
          <h2>Recycling blue bin collection</h2>
        </article>
      
        <article class="bin-card bin-card--garden">
          <img src="https://secure.derby.gov.uk/binday/images/brown-bin.png" alt="Brown bin" />
          <h2>Garden brown bin collection</h2>
        </article>
      
        <article class="bin-card bin-card--food">
          <img src="https://secure.derby.gov.uk/binday/images/food-bin.png" alt="Food bin" />
          <h2>Food waste bin collection</h2>
        </article>
      
        </section>
        <footer>
          Updated 06/04/2026, 14:50:15 UTC
        </footer>
      </section>
    </main>
  </body>
</html>
